<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Windows brand blue — subtle gradient for depth -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0067FF"/>
      <stop offset="50%"  stop-color="#0091FF"/>
      <stop offset="100%" stop-color="#00BCFF"/>
    </linearGradient>

    <!-- Radial mask: opaque at center, fades to transparent at edges -->
    <radialGradient id="fadeGrad" cx="50%" cy="50%" rx="52%" ry="58%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="1"/>
      <stop offset="55%"  stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="edgeFade">
      <rect width="1440" height="900" fill="url(#fadeGrad)"/>
    </mask>

    <!-- Glow filter -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background — very dark blue-black -->
  <rect width="1440" height="900" fill="#060C16"/>

  <!-- Grid — masked + opacity capped to ~12% at center -->
  <g mask="url(#edgeFade)" opacity="0.12">

    <!-- Glow pass -->
    <g filter="url(#glow)" opacity="0.9" stroke="url(#lineGrad)" stroke-width="1">
      <line x1="0"    y1="0" x2="0"    y2="900"/>
      <line x1="45"   y1="0" x2="45"   y2="900"/>
